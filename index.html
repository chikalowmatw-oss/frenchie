<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frenchie - Premium Tutoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --primary: #1e293b; --accent: #6366f1; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; overflow-x: hidden; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); background: #e2e8f0; gap: 1px; border-radius: 24px; overflow: hidden; border: 1px solid #e2e8f0; }
        .day-cell { min-height: 140px; background: white; padding: 12px; transition: 0.2s; position: relative; }
        .day-cell.drag-over { background: #f1f5f9; border: 2px dashed #6366f1; }
        .lesson-bubble { position: relative; padding: 8px 12px; border-radius: 12px; font-size: 11px; font-weight: 800; cursor: grab; margin-top: 6px; color: white; transition: 0.3s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); z-index: 10; }
        .lesson-bubble:active { cursor: grabbing; opacity: 0.8; }
        .status-active { background: var(--primary); }
        .status-done { background: #10b981; }
        .status-requested { background: #f8fafc !important; color: #94a3b8 !important; border: 2px dashed #cbd5e1 !important; } 
        .status-teacher-check { background: var(--accent); animation: pulse 2s infinite; }
        .status-moved-old { background: #fee2e2 !important; color: #ef4444 !important; text-decoration: line-through; opacity: 0.5; }
        
        .hw-check-icon { position: absolute; bottom: 4px; right: 6px; color: #fff; font-size: 10px; background: rgba(0,0,0,0.2); width: 14px; height: 14px; display: flex; items-center; justify-content: center; border-radius: 4px; }
        .hw-waiting-icon { position: absolute; bottom: 4px; right: 6px; color: #f59e0b; font-size: 10px; }
        .type-icon { position: absolute; top: 8px; right: 8px; opacity: 0.5; font-size: 9px; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(99, 102, 241, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); } 100% { box-shadow: 0 0 0 0px rgba(99, 102, 241, 0); } }
        .chat-msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; margin-bottom: 4px; font-size: 14px; position: relative; }
        .msg-me { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-other { background: white; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #e2e8f0; }
        .delete-msg-btn { opacity: 0; transition: 0.2s; position: absolute; top: 50%; transform: translateY(-50%); color: #ef4444; cursor: pointer; padding: 10px; }
        .msg-me .delete-msg-btn { left: -35px; }
        .chat-msg:hover .delete-msg-btn { opacity: 1; }
        .read-status { font-size: 9px; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; opacity: 0.5; }
        .toast { background: white; border-left: 4px solid var(--primary); padding: 16px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 320px; animation: slideIn 0.4s ease-out; margin-bottom: 12px; pointer-events: auto; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="flex flex-col min-h-screen">

<div id="toast-container" class="fixed top-6 right-6 z-[9999] pointer-events-none"></div>

<div id="login-screen" class="fixed inset-0 z-[1000] flex items-center justify-center bg-slate-900 px-4">
    <div class="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-md">
        <h1 class="text-5xl font-black text-slate-900 italic tracking-tighter mb-10 text-center">Frenchie</h1>
        <div class="space-y-4">
            <input type="text" id="login-user" class="w-full p-5 border rounded-2xl outline-none font-bold bg-slate-50" placeholder="Nutzername">
            <input type="password" id="login-pass" class="w-full p-5 border rounded-2xl outline-none font-bold bg-slate-50" placeholder="Passwort">
            <button onclick="app.login()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black uppercase shadow-xl mt-6">Einloggen</button>
        </div>
    </div>
</div>

<div id="app-ui" class="hidden flex-1 flex flex-col">
    <header class="bg-white border-b px-10 py-5 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-8">
            <span class="font-black text-3xl italic tracking-tighter">Frenchie</span>
            <div class="flex bg-slate-100 p-1 rounded-xl border">
                <button onclick="app.setLang('de')" id="lang-de" class="px-4 py-2 text-[10px] font-black rounded-lg bg-white shadow-sm">DE</button>
                <button onclick="app.setLang('fr')" id="lang-fr" class="px-4 py-2 text-[10px] font-black rounded-lg text-slate-400">FR</button>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <button onclick="app.refresh()" class="text-slate-400 hover:text-slate-900 font-black text-[10px] uppercase tracking-widest">
                <i class="fa-solid fa-rotate mr-1"></i> <span data-i18n="refresh">Aktualisieren</span>
            </button>
            <div class="text-right">
                <p id="user-display" class="text-xs font-black uppercase"></p>
                <p id="clock" class="text-[9px] text-slate-400 font-bold uppercase"></p>
            </div>
            <button onclick="location.reload()" class="bg-red-50 text-red-500 w-12 h-12 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-power-off"></i></button>
        </div>
    </header>

    <div class="flex-1 grid grid-cols-1 lg:grid-cols-12">
        <aside class="lg:col-span-2 bg-white border-r p-8 space-y-2">
            <button onclick="app.switchTab('cal')" id="tab-cal-btn" class="w-full text-left p-4 rounded-2xl font-black text-sm bg-slate-900 text-white flex items-center gap-3 transition-all">
                <i class="fa-solid fa-calendar"></i> <span data-i18n="cal">Kalender</span>
            </button>
            <button onclick="app.switchTab('chat')" id="tab-chat-btn" class="w-full text-left p-4 rounded-2xl font-black text-sm text-slate-400 flex items-center gap-3 transition-all">
                <i class="fa-solid fa-message"></i> <span data-i18n="chat">Chat</span>
            </button>
            <div id="sidebar-chats" class="hidden mt-6 pt-6 border-t space-y-1"></div>
        </aside>

        <main class="lg:col-span-10 p-10 bg-slate-50/30">
            <div id="view-cal" class="space-y-8">
                <div class="flex justify-between items-center bg-white p-6 rounded-[2.5rem] border shadow-sm">
                    <div class="flex items-center gap-6">
                        <button onclick="app.moveMonth(-1)" class="w-12 h-12 border rounded-2xl hover:bg-slate-50"><i class="fa-solid fa-chevron-left"></i></button>
                        <h2 id="month-name" class="text-3xl font-black text-slate-900 uppercase tracking-tighter min-w-[250px] text-center"></h2>
                        <button onclick="app.moveMonth(1)" class="w-12 h-12 border rounded-2xl hover:bg-slate-50"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                    <button id="btn-add-lesson" onclick="app.openModal()" class="hidden bg-slate-900 text-white px-10 py-4 rounded-2xl font-black text-xs uppercase tracking-widest">+ <span data-i18n="newLesson">Neue Stunde</span></button>
                </div>
                <div class="calendar-grid" id="calendar-render"></div>
            </div>

            <div id="view-chat" class="hidden h-[750px] flex flex-col bg-white border rounded-[3rem] shadow-xl overflow-hidden">
                <div class="p-8 border-b bg-slate-50/50 flex justify-between items-center">
                    <h3 id="active-chat-title" class="font-black text-sm uppercase">Chat</h3>
                    <button onclick="app.clearChat()" class="text-red-500 font-black text-[10px] uppercase tracking-tighter hover:bg-red-50 px-4 py-2 rounded-xl transition-all">
                        <i class="fa-solid fa-trash-can mr-1"></i> Verlauf leeren
                    </button>
                </div>
                <div id="chat-container" class="flex-1 p-10 overflow-y-auto flex flex-col"></div>
                <div class="p-8 border-t flex gap-4">
                    <input type="text" id="chat-input" class="flex-1 p-5 rounded-2xl bg-slate-50 outline-none font-medium" placeholder="...">
                    <button onclick="app.sendMsg()" class="bg-slate-900 text-white w-16 h-16 rounded-2xl flex items-center justify-center shadow-lg"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </main>
    </div>
</div>

<div id="modal" class="fixed inset-0 z-[2000] bg-slate-900/60 backdrop-blur-md hidden flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-2xl rounded-[3.5rem] p-12 max-h-[90vh] overflow-y-auto shadow-2xl">
        <div class="flex justify-between items-center mb-10">
            <h3 class="text-3xl font-black text-slate-900 uppercase tracking-tighter" data-i18n="details">Details</h3>
            <button onclick="app.closeModal()" class="text-4xl text-slate-300 hover:text-red-500">&times;</button>
        </div>

        <div class="space-y-6">
            <div id="lesson-form" class="grid grid-cols-2 gap-6">
                <div class="col-span-2"><label class="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1 block" data-i18n="topic">Thema</label><input type="text" id="f-topic" class="w-full p-5 bg-slate-50 rounded-2xl font-bold border-none outline-none"></div>
                <div><label class="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1 block" data-i18n="date">Datum</label><input type="date" id="f-date" class="w-full p-5 bg-slate-50 rounded-2xl font-bold border-none outline-none"></div>
                <div><label class="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1 block" data-i18n="time">Uhrzeit</label><input type="time" id="f-time" class="w-full p-5 bg-slate-50 rounded-2xl font-bold border-none outline-none"></div>
                
                <div class="col-span-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1 block" data-i18n="type">Unterrichtsart</label>
                    <select id="f-type" class="w-full p-5 bg-slate-50 rounded-2xl font-bold border-none outline-none appearance-none">
                        <option value="online">Online (Zoom/Teams)</option>
                        <option value="offline">Präsenz (Offline)</option>
                    </select>
                </div>
            </div>

            <div class="bg-slate-50 p-8 rounded-[2.5rem] space-y-4">
                <div class="flex justify-between items-center">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest" data-i18n="hw">Hausaufgaben</label>
                    <div id="hannah-hw-status" class="hidden flex items-center gap-2">
                        <span class="text-[10px] font-black text-slate-900 uppercase" id="hw-status-label">Als erledigt markieren?</span>
                        <input type="checkbox" id="f-hw-done" class="w-6 h-6 accent-emerald-500 cursor-pointer">
                    </div>
                </div>
                <textarea id="f-hw" class="w-full p-6 bg-white border-none rounded-2xl outline-none font-medium h-24" placeholder="..."></textarea>
                
                <div id="teacher-hw-confirm" class="hidden mt-4 bg-amber-100 p-4 rounded-2xl flex justify-between items-center">
                   <p class="text-[10px] font-black text-amber-700 uppercase">Schülerin meldet: Erledigt!</p>
                   <button onclick="app.teacherConfirmHw()" class="bg-amber-600 text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase">Bestätigen</button>
                </div>
            </div>

            <div id="sec-teacher-private" class="bg-indigo-900 p-8 rounded-[2.5rem] space-y-4">
                <label class="text-[10px] font-black text-indigo-300 uppercase tracking-widest" data-i18n="notes">Anmerkungen / Details</label>
                <textarea id="f-private-notes" class="w-full p-6 bg-indigo-800 text-white border-none rounded-2xl outline-none font-medium h-24" placeholder="..."></textarea>
            </div>

            <div id="sec-hannah-cancel" class="hidden bg-red-50 p-8 rounded-[2.5rem] border border-red-100 space-y-4">
                <p class="text-red-600 font-black text-xs uppercase tracking-widest" data-i18n="cancelTitle">Absage / Verschiebung</p>
                <div id="cancel-error" class="hidden bg-red-600 text-white p-4 rounded-xl font-black text-[10px] uppercase text-center" data-i18n="cancelError">Zu spät: Absage nur bis zum Vortag möglich.</div>
                <div id="cancel-inputs" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4"><input type="date" id="c-date" class="p-4 rounded-xl border-none font-bold"><input type="time" id="c-time" class="p-4 rounded-xl border-none font-bold"></div>
                    <textarea id="c-reason" class="w-full p-4 rounded-xl border-none text-sm h-20" placeholder="..."></textarea>
                    <button onclick="app.requestCancel()" class="w-full bg-red-600 text-white p-5 rounded-2xl font-black uppercase text-xs" data-i18n="sendToParent">An Vater senden</button>
                </div>
            </div>

            <div id="sec-parent-confirm" class="hidden bg-amber-50 p-8 rounded-[2.5rem] border border-amber-100 space-y-4">
                <p class="text-amber-600 font-black text-xs uppercase" data-i18n="parentInfoTitle">Anfrage Hannah:</p>
                <div id="parent-info" class="text-sm font-medium italic text-slate-700 bg-white/50 p-5 rounded-2xl"></div>
                <button onclick="app.parentApprove()" class="w-full bg-amber-500 text-white p-5 rounded-2xl font-black uppercase text-xs shadow-lg" data-i18n="parentConfirmBtn">Bestätigen & Lehrer fragen</button>
            </div>

            <div id="sec-teacher-approve" class="hidden bg-indigo-50 p-8 rounded-[2.5rem] border border-indigo-100 space-y-4">
                <p class="text-indigo-600 font-black text-xs uppercase" data-i18n="teacherApproveTitle">Verschiebung bearbeiten</p>
                <div id="teacher-info" class="text-sm font-bold text-slate-800 bg-white/50 p-5 rounded-2xl mb-4"></div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div><label class="text-[9px] font-black text-slate-400 uppercase" data-i18n="altDate">Eigenes Datum</label><input type="date" id="t-alt-date" class="w-full p-4 rounded-xl border-none font-bold text-sm"></div>
                    <div><label class="text-[9px] font-black text-slate-400 uppercase" data-i18n="altTime">Eigene Uhrzeit</label><input type="time" id="t-alt-time" class="w-full p-4 rounded-xl border-none font-bold text-sm"></div>
                </div>
                <div class="flex gap-4">
                    <button onclick="app.teacherDecide(true)" class="flex-1 bg-indigo-600 text-white p-5 rounded-2xl font-black uppercase text-[10px]" data-i18n="accept">Annehmen</button>
                    <button onclick="app.teacherDecide(false)" class="flex-1 bg-slate-800 text-white p-5 rounded-2xl font-black uppercase text-[10px]" data-i18n="counter">Gegenvorschlag</button>
                </div>
            </div>

            <div id="sec-teacher-admin" class="hidden flex items-center gap-4 bg-slate-100 p-6 rounded-3xl">
                <select id="f-rating" class="flex-1 p-4 rounded-xl font-bold bg-white outline-none">
                    <option value="" data-i18n="rating">Bewertung...</option>
                    <option value="gut" data-i18n="r_good">Gut</option>
                    <option value="mittel" data-i18n="r_med">Mittel</option>
                    <option value="schlecht" data-i18n="r_bad">Schlecht</option>
                </select>
                <button onclick="app.markDone()" class="bg-emerald-500 text-white px-8 py-4 rounded-xl font-black text-xs uppercase" data-i18n="doneBtn">Stunde erledigt ✓</button>
            </div>

            <div class="flex gap-4">
                <button id="btn-save" onclick="app.saveLesson()" class="flex-1 bg-slate-900 text-white p-5 rounded-2xl font-black uppercase shadow-xl" data-i18n="save">Speichern</button>
                <button id="btn-del" onclick="app.deleteLesson()" class="hidden bg-red-50 text-red-500 px-8 rounded-2xl"><i class="fa-solid fa-trash"></i></button>
            </div>
            <div id="audit-log" class="text-[9px] font-black text-slate-300 uppercase tracking-widest text-center italic"></div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const _firebaseApp = initializeApp({
    apiKey: "AIzaSyAO8ToOWzuWQ6qSd0bzZqc78boPchayYqc",
    authDomain: "frenchie-38006.firebaseapp.com",
    databaseURL: "https://frenchie-38006-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "frenchie-38006",
    storageBucket: "frenchie-38006.firebasestorage.app",
    messagingSenderId: "189494156775",
    appId: "1:189494156775:web:30dc60a8c090d4bc2bf142"
});
const _db = getDatabase(_firebaseApp);
console.log("✅ Firebase підключено!");

const app = {
    user: null, lang: 'de', viewDate: new Date(),
    lessons: [],
    chats: { 'Gruppen-Chat': [], 'Hannah&Matvii': [], 'Eltern&Matvii': [] },
    activeChan: 'Gruppen-Chat', activeId: null,
    
    i18n: {
        de: { 
            refresh: "Aktualisieren", newLesson: "Neue Stunde", details: "Details", topic: "Thema", 
            cal: "Kalender", chat: "Chat", date: "Datum", time: "Uhrzeit", type: "Unterrichtsart",
            hw: "Hausaufgaben", done: "Erledigt?", notes: "Anmerkungen / Details",
            cancelTitle: "Absage / Verschiebung", cancelError: "Zu spät: Absage nur bis zum Vortag möglich.",
            sendToParent: "An Vater senden", parentInfoTitle: "Anfrage Hannah:", parentConfirmBtn: "Bestätigen & Lehrer fragen",
            teacherApproveTitle: "Verschiebung bearbeiten", altDate: "Eigenes Datum", altTime: "Eigene Uhrzeit",
            accept: "Annehmen", counter: "Gegenvorschlag", rating: "Bewertung...", r_good: "Gut", r_med: "Mittel", r_bad: "Schlecht",
            doneBtn: "Stunde erledigt ✓", save: "Speichern", updated: "System aktualisiert", 
            requestedToast: "neue Anfragen!", placeholderMsg: "Nachricht...", reasonPlaceholder: "Grund für die Verschiebung..."
        },
        fr: { 
            refresh: "Actualiser", newLesson: "Nouveau cours", details: "Détails", topic: "Sujet", 
            cal: "Calendrier", chat: "Chat", date: "Date", time: "Heure", type: "Type de cours",
            hw: "Devoirs", done: "Fait ?", notes: "Remarques / Détails",
            cancelTitle: "Annulation / Report", cancelError: "Temps écoulé (avant le jour J)",
            sendToParent: "Envoyer au père", parentInfoTitle: "Demande Hannah :", parentConfirmBtn: "Confirmer & Demander au prof",
            teacherApproveTitle: "Modifier le report", altDate: "Propre date", altTime: "Propre heure",
            accept: "Accepter", counter: "Contre-proposition", rating: "Évaluation...", r_good: "Bien", r_med: "Moyen", r_bad: "Mauvais",
            doneBtn: "Cours terminé ✓", save: "Enregistrer", updated: "Système mis à jour", 
            requestedToast: "nouvelles demandes !", placeholderMsg: "Message...", reasonPlaceholder: "Raison du report..."
        }
    },

    login() {
        const u = document.getElementById('login-user').value, p = document.getElementById('login-pass').value;
        const users = { 
            'm.chykalov': { pass: 'matheo2011', role: 'teacher', name: 'Matvii' }, 
            'h.karow': { pass: 'H213545K', role: 'student', name: 'Hannah' }, 
            'm.karow': { pass: 'M515646K', role: 'parent', name: 'Eltern' } 
        };
        if (users[u] && users[u].pass === p) {
            this.user = { ...users[u], id: u };
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-ui').classList.remove('hidden');
            document.getElementById('user-display').innerText = this.user.name;
            this.init();
            this.refresh(); 
        } else alert("Error!");
    },

    init() { this.renderSidebar(); this.startClock(); this.setLang('de'); this.startListeners(); },

    refresh() {
        get(ref(_db, 'frenchie')).then(snap => {
            const data = snap.val() || {};
            this.lessons = data.lessons || [];
            this.chats = data.chats || { 'Gruppen-Chat': [], 'Hannah&Matvii': [], 'Eltern&Matvii': [] };
            this.renderCalendar(); 
            if(!document.getElementById('view-chat').classList.contains('hidden')) this.renderMsgs();
            this.checkNotifs(); 
            this.toast(this.i18n[this.lang].updated, "fa-rotate");
        });
    },

    setLang(l) {
        this.lang = l;
        document.getElementById('lang-de').className = l === 'de' ? 'px-4 py-2 text-[10px] font-black rounded-lg bg-white shadow-sm' : 'px-4 py-2 text-[10px] font-black rounded-lg text-slate-400';
        document.getElementById('lang-fr').className = l === 'fr' ? 'px-4 py-2 text-[10px] font-black rounded-lg bg-white shadow-sm' : 'px-4 py-2 text-[10px] font-black rounded-lg text-slate-400';
        
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            el.innerText = this.i18n[l][key] || key;
        });

        document.getElementById('chat-input').placeholder = this.i18n[l].placeholderMsg;
        document.getElementById('c-reason').placeholder = this.i18n[l].reasonPlaceholder;
        
        this.renderCalendar();
        this.renderSidebar();
    },

    renderCalendar() {
        const grid = document.getElementById('calendar-render'), y = this.viewDate.getFullYear(), m = this.viewDate.getMonth();
        document.getElementById('month-name').innerText = new Intl.DateTimeFormat(this.lang==='de'?'de-DE':'fr-FR',{month:'long',year:'numeric'}).format(this.viewDate);
        grid.innerHTML = '';
        const days = this.lang==='de'?['Mo','Di','Mi','Do','Fr','Sa','So']:['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
        days.forEach(d => grid.innerHTML += `<div class="bg-slate-900 text-white text-[10px] font-black p-4 text-center uppercase">${d}</div>`);
        const offset = new Date(y, m, 1).getDay() === 0 ? 6 : new Date(y, m, 1).getDay()-1;
        for(let i=0; i<offset; i++) grid.innerHTML += `<div class="day-cell bg-slate-50/50"></div>`;
        for(let d=1; d<=new Date(y, m+1, 0).getDate(); d++) {
            const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const cell = document.createElement('div'); cell.className = 'day-cell border-r border-b border-slate-100 flex flex-col gap-1';
            cell.setAttribute('data-date', ds);
            
            // Drag & Drop Handlers
            cell.ondragover = (e) => { e.preventDefault(); cell.classList.add('drag-over'); };
            cell.ondragleave = () => { cell.classList.remove('drag-over'); };
            cell.ondrop = (e) => { 
                e.preventDefault(); 
                cell.classList.remove('drag-over');
                const lessonId = e.dataTransfer.getData('lessonId');
                if(this.user.role === 'teacher') this.moveLesson(lessonId, ds);
            };

            cell.innerHTML = `<span class="text-[11px] font-black text-slate-300">${d}</span>`;
            this.lessons.filter(l => l.date === ds).forEach(l => {
                const b = document.createElement('div'); 
                b.className = `lesson-bubble status-${l.status} ${l.done ? 'status-done' : ''}`;
                b.draggable = (this.user.role === 'teacher' && !l.done);
                b.ondragstart = (e) => { e.dataTransfer.setData('lessonId', l.id); };

                const typeIcon = l.type === 'offline' ? 'fa-house-user' : 'fa-video';
                
                let hwIconHtml = '';
                if(l.hw_confirmed) {
                    hwIconHtml = '<div class="hw-check-icon"><i class="fa-solid fa-check"></i></div>';
                } else if(l.hw_done) {
                    hwIconHtml = '<div class="hw-waiting-icon"><i class="fa-solid fa-hourglass-half"></i></div>';
                }

                b.innerHTML = `<div class="truncate pr-4">${l.topic}</div><div class="opacity-70 text-[9px] uppercase">${l.time}</div><div class="type-icon"><i class="fa-solid ${typeIcon}"></i></div>${hwIconHtml}`;
                b.onclick = (e) => { e.stopPropagation(); this.openModal(l.id); };
                cell.appendChild(b);
            });
            grid.appendChild(cell);
        }
        document.getElementById('btn-add-lesson').classList.toggle('hidden', !this.user || this.user.role !== 'teacher');
    },

    moveLesson(id, newDate) {
        const idx = this.lessons.findIndex(x => x.id == id);
        if(idx !== -1) {
            this.lessons[idx].date = newDate;
            this.lessons[idx].log.push(`Datum verschoben auf ${newDate} am ${new Date().toLocaleString()}`);
            this.save();
            this.renderCalendar();
            this.toast("Datum aktualisiert!");
        }
    },

    openModal(id = null) {
        this.activeId = id; document.getElementById('modal').classList.remove('hidden');
        const l = id ? this.lessons.find(x => x.id === id) : { topic: '', date: '', time: '', type: 'online', status: 'active', hw: '', hw_done: false, hw_confirmed: false, privateNotes: '', log: [] };
        
        document.getElementById('f-topic').value = l.topic; 
        document.getElementById('f-date').value = l.date; 
        document.getElementById('f-time').value = l.time;
        document.getElementById('f-type').value = l.type || 'online';
        document.getElementById('f-hw').value = l.hw || '';
        document.getElementById('f-hw-done').checked = l.hw_done || false;
        document.getElementById('f-private-notes').value = l.privateNotes || '';
        document.getElementById('f-rating').value = l.rating || '';
        document.getElementById('audit-log').innerText = (l.log || []).join(' | ');

        const isT = this.user.role === 'teacher', isS = this.user.role === 'student', isP = this.user.role === 'parent';
        
        document.getElementById('f-topic').disabled = !isT;
        document.getElementById('f-date').disabled = !isT;
        document.getElementById('f-time').disabled = !isT;
        document.getElementById('f-type').disabled = !isT;
        document.getElementById('f-hw').disabled = !isT;
        document.getElementById('f-private-notes').disabled = !isT;
        
        document.getElementById('hannah-hw-status').classList.toggle('hidden', !isS);
        document.getElementById('teacher-hw-confirm').classList.toggle('hidden', !isT || !l.hw_done || l.hw_confirmed);
        
        if(l.hw_confirmed) {
            document.getElementById('hw-status-label').innerText = "Hausaufgabe bestätigt ✓";
            document.getElementById('f-hw-done').disabled = true;
        } else {
            document.getElementById('hw-status-label').innerText = "Als erledigt markieren?";
            document.getElementById('f-hw-done').disabled = false;
        }

        document.getElementById('btn-save').classList.toggle('hidden', isP);
        document.getElementById('btn-del').classList.toggle('hidden', !isT || !id);
        document.getElementById('sec-teacher-admin').classList.toggle('hidden', !isT);
        
        // Verbesserte Absage-Logik: Nur bis Vortag möglich
        if(isS && l.status === 'active') {
            document.getElementById('sec-hannah-cancel').classList.remove('hidden');
            const now = new Date();
            now.setHours(0,0,0,0);
            const lDate = new Date(l.date);
            lDate.setHours(0,0,0,0);
            
            // Wenn der Tag des Unterrichts erreicht oder überschritten ist
            if(now.getTime() >= lDate.getTime()) {
                document.getElementById('cancel-error').classList.remove('hidden');
                document.getElementById('cancel-inputs').classList.add('hidden');
            } else {
                document.getElementById('cancel-error').classList.add('hidden');
                document.getElementById('cancel-inputs').classList.remove('hidden');
            }
        } else { document.getElementById('sec-hannah-cancel').classList.add('hidden'); }

        const isReq = l.status === 'requested';
        document.getElementById('sec-parent-confirm').classList.toggle('hidden', !isP || !isReq);
        if(isReq) document.getElementById('parent-info').innerText = `${l.cReason} \n${l.cDate} ${l.cTime}`;
        
        const isCheck = l.status === 'teacher-check';
        document.getElementById('sec-teacher-approve').classList.toggle('hidden', !isT || !isCheck);
        if(isCheck) {
            document.getElementById('teacher-info').innerText = `${l.cDate} ${l.cTime}`;
            document.getElementById('t-alt-date').value = l.cDate;
            document.getElementById('t-alt-time').value = l.cTime;
        }
    },

    teacherConfirmHw() {
        const idx = this.lessons.findIndex(x => x.id === this.activeId);
        this.lessons[idx].hw_confirmed = true;
        this.lessons[idx].log.push(`HW bestätigt von Matvii am ${new Date().toLocaleDateString()}`);
        this.save(); this.closeModal(); this.renderCalendar(); this.toast("Hausaufgabe bestätigt!");
    },

    saveLesson() {
        const isT = this.user.role === 'teacher', isS = this.user.role === 'student';
        if(this.activeId) {
            const idx = this.lessons.findIndex(x => x.id === this.activeId);
            const l = this.lessons[idx];
            if(isS) {
                const wasDone = l.hw_done;
                l.hw_done = document.getElementById('f-hw-done').checked;
                if(!wasDone && l.hw_done) {
                    l.log.push(`Hannah: HW erledigt am ${new Date().toLocaleDateString()}`);
                    this.toast("An Matvii gesendet!");
                }
            }
            if(isT) {
                l.topic = document.getElementById('f-topic').value; 
                l.date = document.getElementById('f-date').value;
                l.time = document.getElementById('f-time').value; 
                l.type = document.getElementById('f-type').value;
                l.hw = document.getElementById('f-hw').value; 
                l.privateNotes = document.getElementById('f-private-notes').value;
            }
        } else if(isT) {
            this.lessons.push({ 
                id: Date.now(), 
                topic: document.getElementById('f-topic').value, 
                date: document.getElementById('f-date').value, 
                time: document.getElementById('f-time').value, 
                type: document.getElementById('f-type').value,
                hw: document.getElementById('f-hw').value, 
                privateNotes: document.getElementById('f-private-notes').value,
                status: 'active', hw_done: false, hw_confirmed: false, done: false,
                log: [`Erstellt am ${new Date().toLocaleDateString()}`] 
            });
        }
        this.save(); this.closeModal(); this.renderCalendar(); this.toast("Gespeichert!");
    },

    markDone() {
        const idx = this.lessons.findIndex(x => x.id === this.activeId);
        this.lessons[idx].done = true; 
        this.lessons[idx].rating = document.getElementById('f-rating').value;
        this.save(); this.closeModal(); this.renderCalendar();
    },

    requestCancel() {
        const idx = this.lessons.findIndex(x => x.id === this.activeId);
        Object.assign(this.lessons[idx], { status: 'requested', cDate: document.getElementById('c-date').value, cTime: document.getElementById('c-time').value, cReason: document.getElementById('c-reason').value, cTS: new Date().toLocaleString() });
        this.lessons[idx].log.push(`Anfrage Hannah ${this.lessons[idx].cTS}`);
        this.save(); this.closeModal(); this.renderCalendar();
    },

    parentApprove() {
        const idx = this.lessons.findIndex(x => x.id === this.activeId);
        this.lessons[idx].status = 'teacher-check';
        this.lessons[idx].log.push(`Vater OK ${new Date().toLocaleString()}`);
        this.save(); this.closeModal(); this.renderCalendar();
    },

    teacherDecide(useProposed) {
        const idx = this.lessons.findIndex(x => x.id === this.activeId); 
        const l = this.lessons[idx];
        let fDate = useProposed ? l.cDate : document.getElementById('t-alt-date').value;
        let fTime = useProposed ? l.cTime : document.getElementById('t-alt-time').value;
        l.status = 'moved-old';
        this.lessons.push({ id: Date.now(), topic: l.topic + " (Verschoben)", date: fDate, time: fTime, type: l.type, status: 'active', hw: l.hw, privateNotes: l.privateNotes, hw_done: false, hw_confirmed: false, log: [`Verschoben von ${l.date}`] });
        this.save(); this.closeModal(); this.renderCalendar();
    },

    deleteLesson() { this.lessons = this.lessons.filter(x => x.id !== this.activeId); this.save(); this.closeModal(); this.renderCalendar(); },

    sendMsg() {
        const inp = document.getElementById('chat-input'); if(!inp.value.trim()) return;
        this.chats[this.activeChan].push({ id: Date.now(), u: this.user.name, t: inp.value, ts: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), readBy: [this.user.name], readTime: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
        inp.value = ''; this.save(); this.renderMsgs();
    },

    deleteMsg(msgId) {
        if(confirm("Diese Nachricht löschen?")) {
            this.chats[this.activeChan] = this.chats[this.activeChan].filter(m => m.id !== msgId);
            this.save(); this.renderMsgs();
        }
    },

    clearChat() {
        if(confirm("Verlauf löschen?")) {
            this.chats[this.activeChan] = [];
            this.save(); this.renderMsgs(); this.toast("Verlauf gelöscht");
        }
    },

    renderMsgs() {
        const container = document.getElementById('chat-container'); container.innerHTML = '';
        this.chats[this.activeChan].forEach(m => {
            const isMe = m.u === this.user.name;
            if(!m.readBy.includes(this.user.name)) { m.readBy.push(this.user.name); m.readTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); this.save(); }
            const delBtn = isMe ? `<div class="delete-msg-btn" onclick="app.deleteMsg(${m.id})"><i class="fa-solid fa-trash-can"></i></div>` : '';
            container.innerHTML += `<div class="chat-msg ${isMe ? 'msg-me' : 'msg-other'}">${delBtn}<p class="text-[8px] font-black opacity-40 uppercase mb-1">${m.u} • ${m.ts}</p><p class="font-medium">${m.t}</p></div><p class="read-status ${isMe ? 'text-right mr-4' : 'ml-4'}">${m.readBy.length > 1 ? `Gelesen ${m.readTime}` : 'Gesendet'}</p>`;
        });
        container.scrollTop = container.scrollHeight;
    },

    renderSidebar() {
        const s = document.getElementById('sidebar-chats'); s.innerHTML = '';
        const channels = [{ id: 'Gruppen-Chat', a: ['teacher', 'student', 'parent'] }, { id: 'Hannah&Matvii', a: ['teacher', 'student'] }, { id: 'Eltern&Matvii', a: ['teacher', 'parent'] }];
        channels.forEach(ch => {
            if(ch.a.includes(this.user.role)) {
                const b = document.createElement('button'); b.className = `w-full text-left px-4 py-3 text-[10px] font-black uppercase transition-all ${this.activeChan === ch.id ? 'text-slate-900 bg-slate-50 rounded-xl' : 'text-slate-400 hover:text-slate-900'}`;
                b.innerText = ch.id; b.onclick = () => { this.activeChan = ch.id; this.switchTab('chat'); this.renderMsgs(); document.getElementById('active-chat-title').innerText = ch.id; };
                s.appendChild(b);
            }
        });
    },

    switchTab(t) {
        document.getElementById('view-cal').classList.toggle('hidden', t !== 'cal');
        document.getElementById('view-chat').classList.toggle('hidden', t !== 'chat');
        document.getElementById('sidebar-chats').classList.toggle('hidden', t !== 'chat');
        document.getElementById('tab-cal-btn').className = t === 'cal' ? 'w-full text-left p-4 rounded-2xl font-black text-sm bg-slate-900 text-white flex items-center gap-3' : 'w-full text-left p-4 rounded-2xl font-black text-sm text-slate-400 flex items-center gap-3';
        document.getElementById('tab-chat-btn').className = t === 'chat' ? 'w-full text-left p-4 rounded-2xl font-black text-sm bg-slate-900 text-white flex items-center gap-3' : 'w-full text-left p-4 rounded-2xl font-black text-sm text-slate-400 flex items-center gap-3';
    },

    toast(msg, icon = "fa-bell") {
        const t = document.createElement('div'); t.className = 'toast flex items-center gap-4';
        t.innerHTML = `<i class="fa-solid ${icon}"></i><p class="text-[11px] font-black uppercase">${msg}</p>`;
        document.getElementById('toast-container').appendChild(t); setTimeout(() => t.remove(), 6000);
    },

    checkNotifs() {
        const r = this.user.role;
        let count = (r === 'parent') ? this.lessons.filter(l => l.status === 'requested').length : (r === 'teacher') ? this.lessons.filter(l => (l.status === 'teacher-check' || (l.hw_done && !l.hw_confirmed))).length : 0;
        if(count > 0) this.toast(`${count} ${this.i18n[this.lang].requestedToast}`);
    },

    save() { 
        set(ref(_db, 'frenchie'), { lessons: this.lessons, chats: this.chats })
            .catch(err => console.error('Firebase save error:', err));
    },
    moveMonth(n) { this.viewDate.setMonth(this.viewDate.getMonth() + n); this.renderCalendar(); },
    closeModal() { document.getElementById('modal').classList.add('hidden'); },
    startClock() { setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); }, 1000); },

    startListeners() {
        // Real-time listener — оновлює дані у ВСІХ користувачів автоматично
        onValue(ref(_db, 'frenchie'), snap => {
            const data = snap.val() || {};
            this.lessons = data.lessons || [];
            this.chats = data.chats || { 'Gruppen-Chat': [], 'Hannah&Matvii': [], 'Eltern&Matvii': [] };
            this.renderCalendar();
            if (!document.getElementById('view-chat').classList.contains('hidden')) this.renderMsgs();
        });
    }
};
window.app = app; // Робимо app глобальним для onclick у HTML
</script>

</body>
</html>
